services:
  app:
    build: .
    container_name: bellory_admin_api
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8085:8085"
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Volume persistente para uploads (suporte/imagens admin)
    volumes:
      - /var/bellory-admin/prod/uploads:/var/bellory-admin/prod/uploads

    # Carrega variaveis do arquivo .env
    env_file:
      - .env

    environment:
      # ATIVA O PERFIL DE PRODUCAO
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8085

      # Credenciais do banco (do arquivo .env)
      - DB_PROD_USER=${DB_PROD_USER}
      - DB_PROD_PASSWORD=${DB_PROD_PASSWORD}

      # JWT (mesmo segredo do Bellory-API para tokens compativeis)
      - API_SECURITY_TOKEN_SECRET=${API_SECURITY_TOKEN_SECRET}
      - API_SECURITY_TOKEN_EXPIRATION=${API_SECURITY_TOKEN_EXPIRATION:-36000}

      # Payment API
      - PAYMENT_API_URL=${PAYMENT_API_URL}
      - PAYMENT_API_KEY=${PAYMENT_API_KEY}
      - PAYMENT_API_COMPANY_ID=${PAYMENT_API_COMPANY_ID}
      - PAYMENT_API_TIMEOUT_MS=${PAYMENT_API_TIMEOUT_MS:-3000}

      # Cache TTLs (admin e dono do cache Redis)
      - PAYMENT_CACHE_FRESH_TTL_SECONDS=${PAYMENT_CACHE_FRESH_TTL_SECONDS:-300}
      - PAYMENT_CACHE_STALE_TTL_SECONDS=${PAYMENT_CACHE_STALE_TTL_SECONDS:-86400}

      # Redis (servico interno do compose, resolvido por DNS docker)
      # bellory_api futuro pode apontar pra host.docker.internal:6381 (porta exposta abaixo)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

      # Email
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bellory_admin_redis
    # Porta 6381 host -> 6379 container.
    # Permite que o bellory_api (futuro) ative cache apontando para
    # host.docker.internal:6381 sem mudar networks.
    ports:
      - "6381:6379"
    volumes:
      - bellory_admin_redis_data:/data
    # Append-only persistence garante que o cache sobrevive a restart.
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  bellory_admin_redis_data:
    driver: local
