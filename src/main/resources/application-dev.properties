# ========================================
# CONFIGURACAO DE DESENVOLVIMENTO - Bellory-Admin-API
# ========================================
# Mesmo banco do Bellory-API (split de codigo, banco compartilhado)

spring.datasource.url=jdbc:postgresql://localhost:5432/bellory_dev
spring.datasource.username=bellory_dev
spring.datasource.password=mB6EI3IH4OtYnY2

#spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
#spring.datasource.username=postgres
#spring.datasource.password=postgres

# Porta do admin: 8085 (Bellory-API roda em 8081 para coexistir local)
server.port=8085

# Flyway - mais permissivo em dev
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=false

# JPA - mostrar SQL em dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging em dev
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb=DEBUG

# Token JWT (alinhado com app dev)
api.security.token.expiration=360000

# URL base do painel admin (front). Em dev local apontar para o front admin local
# ou para o front admin dev hospedado.
admin.url=${ADMIN_URL:http://localhost:3001}

# Upload de arquivos (suporte/imagens admin) - dev local
file.upload.dir=/var/bellory-admin/dev/uploads
file.upload.base-url=http://localhost:8085/uploads

# Payment API (dev)
payment.api.url=${PAYMENT_API_URL:https://pay-api.bellory.com.br}
payment.api.key=${PAYMENT_API_KEY:pk_F9vtY0M_NVmjV1zLnmD3FBxctdIj9aNCLlv7anMtDQxZEd-npGTmMdz0jSNfOCAu}
payment.api.company-id=${PAYMENT_API_COMPANY_ID:4}

# Redis local (docker)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Healthcheck Redis desabilitado em dev (mesmo motivo do Bellory-API)
management.health.redis.enabled=false

# Healthcheck Mail desabilitado em dev (sem EMAIL_PASSWORD configurado).
# Em prod, configurar EMAIL_PASSWORD via env e remover esta linha.
management.health.mail.enabled=false

# ========================================
# FORMULARIO DE CONTATO PUBLICO (DEV)
# ========================================
# Inclui localhost na allowlist. Em prod usar a versao do application.properties.
bellory.contact.allowed-origins=${BELLORY_CONTACT_ALLOWED_ORIGINS:https://bellory.com.br,https://www.bellory.com.br,http://localhost:3000,http://localhost:3001}

# Turnstile - chave dev (rotacionar antes de prod). NAO comitar a key real
# em ambientes publicos; aqui esta para dev local apenas.
bellory.contact.turnstile.secret-key=${TURNSTILE_SECRET_KEY:0x4AAAAAADLBXBrw54umDHV0lxDUauBCx5E}

# Salt local apenas para dev. Em prod, gerar 32 bytes random e setar via env.
bellory.contact.ip-hash-salt=${LEAD_IP_HASH_SALT:dev-salt-trocar-em-prod}
