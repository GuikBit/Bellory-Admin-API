spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# ========================================
# SWAGGER / OPENAPI
# ========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none

# ========================================
# JWT (mesmo segredo do Bellory-API para tokens compativeis)
# ========================================
# IMPORTANTE: o TokenService le `api.security.token.secret`. Manter este nome
# para tokens serem validos nos dois projetos.
api.security.token.secret=${API_SECURITY_TOKEN_SECRET:my-secret-key}
api.security.token.expiration=${API_SECURITY_TOKEN_EXPIRATION:36000}

# ========================================
# FLYWAY (admin + site)
# ========================================
spring.flyway.enabled=true
spring.flyway.schemas=admin,site
spring.flyway.default-schema=admin
spring.flyway.locations=classpath:db/migration
spring.flyway.create-schemas=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Baseline: assume tudo ate V73 ja aplicado pelo Bellory-API.
# Apos o split, qualquer migration do schema admin/site comeca >= V74
# e roda com tabela de historico propria.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=73
spring.flyway.table=flyway_schema_history_admin

# JPA validate (todas as entities devem casar com o banco)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf: ate templates de email migrarem (FASE 3), nao reclamar da pasta vazia
spring.thymeleaf.check-template-location=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Pool de conexoes - admin tem carga menor que app cliente
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Upload de arquivos (admin envia imagens de suporte)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ========================================
# HTTP CLIENT (PaymentApiClient)
# ========================================
spring.http.client.connect-timeout=5000
spring.http.client.read-timeout=30000

# ========================================
# EMAIL - notificacoes de cobranca/assinatura
# ========================================
spring.mail.host=smtp.hostinger.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:contato@bellory.com.br}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.hostinger.com

email.from.name=Bellory Admin
email.from.address=${EMAIL_USERNAME:no-reply@bellory.com.br}

# ========================================
# PAYMENT API
# ========================================
payment.api.url=${PAYMENT_API_URL:https://pay-api.bellory.com.br}
payment.api.key=${PAYMENT_API_KEY:pk_F9vtY0M_NVmjV1zLnmD3FBxctdIj9aNCLlv7anMtDQxZEd-npGTmMdz0jSNfOCAu}
payment.api.company-id=${PAYMENT_API_COMPANY_ID:4}
payment.api.timeout-ms=${PAYMENT_API_TIMEOUT_MS:3000}

# Cache TTLs - admin e dono do cache
payment.cache.fresh-ttl-seconds=${PAYMENT_CACHE_FRESH_TTL_SECONDS:300}
payment.cache.stale-ttl-seconds=${PAYMENT_CACHE_STALE_TTL_SECONDS:86400}

# ========================================
# REDIS (compartilhado com Bellory-API)
# ========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2000}

# Task scheduling
spring.task.scheduling.pool.size=2
