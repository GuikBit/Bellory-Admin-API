# ========================================
# CONFIGURACAO DE PRODUCAO - Bellory-Admin-API
# ========================================

spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/bellory_dev
spring.datasource.username=${DB_DEV_USER}
spring.datasource.password=${DB_DEV_PASSWORD}

# Porta interna do container (alinhada com Dockerfile EXPOSE 8085 e docker-compose.yml)
server.port=${SERVER_PORT:8085}

# Flyway prod
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

# JPA prod
spring.jpa.show-sql=false

# Hikari prod (admin tem carga menor que app cliente)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5

# Logging prod
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO

# URLs publicas
admin.url=https://admin.bellory.com.br

# Upload de arquivos
file.upload.dir=/var/bellory-admin/prod/uploads
file.upload.base-url=https://api-admin.bellory.com.br/uploads
